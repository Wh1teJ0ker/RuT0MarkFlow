name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Lightweight lint gate (no Rust toolchain needed) ──
  # Runs version:check + repo:check + frontend tests + frontend build.
  # publish depends only on this job; rust-check runs in parallel with publish.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version sync
        run: pnpm version:check -- --tag "${{ github.ref_name }}"

      - name: Run repo hygiene checks
        run: pnpm repo:check

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  # ── Rust verification gate (runs in parallel with publish) ──
  # cargo test + clippy + pressure test. Does NOT block publish.
  rust-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libappindicator3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run pressure test gate
        run: PRESSURE_SKIP_CLIPPY=1 pnpm pressure:test

      - name: Run Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  # ── Build & publish platform bundles ──
  # Depends only on lint (fast gate). rust-check runs in parallel.
  publish:
    needs: lint
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-latest
            args: --bundles deb,appimage
            rust_targets: ""
          - platform: windows-latest
            args: --bundles nsis
            rust_targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libappindicator3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: RuT0MarkFlow ${{ github.ref_name }}
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          uploadUpdaterJson: true
          uploadWorkflowArtifacts: true
          # 命名令牌说明：
          #   [name]     - 项目名称（小写）
          #   [version]  - 版本号（不含 v 前缀）
          #   [platform] - 目标平台（Linux 为 ubuntu，非 linux）
          #   [arch]     - CPU 架构（x64 / aarch64）
          #   [setup]    - 安装程序后缀（macOS 下为空）
          #   [ext]      - 文件扩展名
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch]_[setup][ext]"
          workflowArtifactNamePattern: "[platform]-[arch]-[bundle]"
          retryAttempts: 2
          args: ${{ matrix.args }}

      - name: Build and publish portable Windows binary
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: RuT0MarkFlow ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          uploadUpdaterJson: false
          uploadPlainBinary: true
          uploadWorkflowArtifacts: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch]_portable[ext]"
          retryAttempts: 2
          args: --no-bundle
